<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
</head>

<body>
    <h1>Book an Appointment</h1>
    <form action="submit appointment.php" method="post">
        <label for="pname">Patient Name: </label><br>
        <input type="text" id="pname" name="pname" required><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="phone">Contact Number: </label><br>
        <input type="tel" id="phone" name="phone"><br><br>
        <label for="dept">Department: </label><br>
        <select id="dept" name="dept">
            <option value="cardio">Cardiology</option>
            <option value="neuro">Neurology</option>
            <option value="ortho">Orthopedics</option>
        </select><br><br>
        <label>Gender: </label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>
        <label>Symptoms:</label><br>
        <input type="checkbox" id="fever" name="symptom" value="fever">
        <label for="fever">Fever</label>
        <input type="checkbox" id="cough" name="symptom" value="cough">
        <label for="cough">Cough</label><br><br>
        <label for="fever">Fever</label>
        <input type="checkbox" id="cough" name="symptom" value="cough">
        <label for="cough">Cough</label><br><br>
        <input type="submit" value="Book Now">
        <input type="reset" value="Clear Form">
    </form>
</body>

</html>
