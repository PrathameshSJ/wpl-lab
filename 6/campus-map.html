<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hospital Map</title>
</head>

<body>
    <h1>Interactive Hospital Layout</h1>
    <p>Click on the areas in the image (Left side for Emergency, Right side for Pharmacy).</p>
    <img src="https://i.pinimg.com/736x/83/c9/22/83c922df6ceefd6e98bc5775ee57edff.jpg" alt="Hospital Layout"
        usemap="#hospitalmap" width="600" height="400">
    <map name="hospitalmap">
        <area shape="rect" coords="0,0,300,400" href="services.html" alt="Emergency Ward"
            title="Go to Emergency Services">
        <area shape="rect" coords="300,0,600,400" href="doctors.html" alt="Pharmacy" title="Go to Pharmacy Info">
    </map>
</body>

</html>
